name: emvigo_test
description: "Flutter project following clean architecture with BLoC/Cubit state management."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # Core
  cupertino_icons: ^1.0.8
  get_it: ^8.0.0
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  dio: ^5.7.0
  retry: ^3.1.2
  go_router: ^14.6.2
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  hydrated_bloc: ^9.1.5
  bloc_concurrency: ^0.2.5
  logger: ^2.5.0

  # Firebase
  firebase_core: ^4.0.0
  firebase_crashlytics: ^5.0.0
  firebase_messaging: ^16.0.0
  flutter_local_notifications: ^18.0.1

  # Utils
  intl: ^0.20.1
  pretty_dio_logger: ^1.4.0
  toastification: ^2.3.0
  infinite_scroll_pagination: ^4.1.0
  package_info_plus: ^8.2.1
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  google_fonts: ^6.3.2

  # Widgets
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  lottie: ^3.3.0
  pinput: ^5.0.0
  animations: ^2.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mason: ^0.1.0-dev.60

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/svg/
    - assets/lottie/
